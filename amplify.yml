version: 1
applications:
  - appRoot: apps/web-mui
    frontend:
      phases:
        preBuild:
          commands:
            - npm install
        build:
          commands:
            - npm --workspace apps/web-mui run build
      artifacts:
        baseDirectory: apps/web-mui/dist
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
