server {
    listen 80;
    server_name portal.wannlynx.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name portal.wannlynx.com;

    ssl_certificate /etc/letsencrypt/live/portal.wannlynx.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/portal.wannlynx.com/privkey.pem;

    root /home/ubuntu/wl-portal/apps/web-mui/dist;
    index index.html;

    location /assets/ {
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:4000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass http://127.0.0.1:4000/auth/;
        proxy_http_version 1.1;
